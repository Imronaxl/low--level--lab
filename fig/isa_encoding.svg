<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 420" font-family="Arial, sans-serif">
  <style>
    text { font-family: Arial, sans-serif; }
    .block { fill: none; stroke: black; stroke-width: 2; }
    .block-label { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .sub-label { font-size: 11px; text-anchor: middle; }
    .signal { font-size: 9px; fill: black; }
    .data-line { stroke: black; stroke-width: 1.5; fill: none; }
    .subsystem { fill: none; stroke: black; stroke-width: 2; }
    .sub-header { font-size: 12px; font-weight: bold; text-anchor: middle; }
  </style>

  <rect width="850" height="420" fill="white"/>

  <text x="425" y="25" text-anchor="middle" font-size="16" font-weight="bold">ISA Instruction Encoding (CISC, Variable Length)</text>

  <!-- === Byte 0 format === -->
  <rect class="block" x="40" y="55" width="300" height="60"/>
  <text class="block-label" x="190" y="78">Byte 0: [OPCODE:6][MOD:2]</text>
  <text class="sub-label" x="190" y="100" font-size="10">Opcode — instruction identifier (0x00-0x5F)</text>

  <!-- === MOD modes === -->
  <rect class="subsystem" x="40" y="140" width="770" height="180"/>
  <text class="sub-header" x="425" y="165">Addressing Modes (MOD field)</text>

  <!-- MOD 00: Reg-Reg -->
  <rect class="block" x="60" y="185" width="170" height="70"/>
  <text class="block-label" x="145" y="210">MOD=00: Reg-Reg</text>
  <text class="sub-label" x="145" y="230" font-size="10">[Rd:4][Rs:4]</text>
  <text class="sub-label" x="145" y="248" font-size="9">2 bytes total</text>

  <!-- MOD 01: Reg-Imm -->
  <rect class="block" x="250" y="185" width="170" height="70"/>
  <text class="block-label" x="335" y="210">MOD=01: Reg-Imm</text>
  <text class="sub-label" x="335" y="230" font-size="10">[Rd:4][imm16 LE]</text>
  <text class="sub-label" x="335" y="248" font-size="9">4 bytes total</text>

  <!-- MOD 10: Reg-Mem -->
  <rect class="block" x="440" y="185" width="170" height="70"/>
  <text class="block-label" x="525" y="210">MOD=10: Reg-Mem</text>
  <text class="sub-label" x="525" y="230" font-size="10">[Rd:4][addr16 LE]</text>
  <text class="sub-label" x="525" y="248" font-size="9">4 bytes total</text>

  <!-- MOD 11: Direct Address -->
  <rect class="block" x="630" y="185" width="170" height="70"/>
  <text class="block-label" x="715" y="210">MOD=11: Direct Addr</text>
  <text class="sub-label" x="715" y="230" font-size="10">[addr16 LE]</text>
  <text class="sub-label" x="715" y="248" font-size="9">3 bytes (JMP/JZ)</text>

  <!-- === Special instruction ranges === -->
  <rect class="subsystem" x="40" y="340" width="770" height="70"/>
  <text class="sub-header" x="425" y="365">Special Instruction Ranges</text>

  <text class="signal" x="60" y="390" font-size="11">0x40 (IN):  [0x40][reg][port] — 3 bytes</text>
  <text class="signal" x="60" y="405" font-size="11">0x41 (OUT): [0x41][port][reg] — 3 bytes</text>
  <text class="signal" x="450" y="390" font-size="11">0x58-0x5F: Vector ops (VADD, VSUB, VMUL, VDIV)</text>
  <text class="signal" x="450" y="405" font-size="11">[opcode][vec_byte] — 2 bytes</text>

  <!-- === Instruction table === -->
  <rect class="subsystem" x="40" y="425" width="770" height="0" rx="2"/>
</svg>
