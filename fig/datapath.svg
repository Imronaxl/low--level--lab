<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Arial, sans-serif">
  <style>
    text { font-family: Arial, sans-serif; }
    .block { fill: none; stroke: black; stroke-width: 2; }
    .block-label { font-size: 14px; font-weight: bold; text-anchor: middle; }
    .sub-label { font-size: 11px; text-anchor: middle; }
    .signal { font-size: 9px; fill: black; }
    .signal-vert { font-size: 9px; fill: black; writing-mode: tb; }
    .data-line { stroke: black; stroke-width: 1.5; fill: none; }
    .ctrl-line { stroke: black; stroke-width: 1; fill: none; stroke-dasharray: 6 3; }
    .subsystem { fill: none; stroke: black; stroke-width: 2; }
    .sub-header { font-size: 12px; font-weight: bold; text-anchor: middle; }
  </style>

  <rect width="960" height="620" fill="white"/>

  <text x="480" y="25" text-anchor="middle" font-size="16" font-weight="bold">DataPath — CISC Microcoded Processor</text>

  <!-- === SUBSYSTEM: Registers === -->
  <rect class="subsystem" x="30" y="50" width="200" height="200" rx="2"/>
  <text class="sub-header" x="130" y="70">Register File</text>

  <rect class="block" x="50" y="85" width="160" height="35"/>
  <text class="sub-label" x="130" y="107">R0</text>

  <rect class="block" x="50" y="125" width="160" height="35"/>
  <text class="sub-label" x="130" y="147">R1</text>

  <rect class="block" x="50" y="165" width="160" height="35"/>
  <text class="sub-label" x="130" y="187">R2</text>

  <rect class="block" x="50" y="205" width="160" height="35"/>
  <text class="sub-label" x="130" y="227">R3</text>

  <!-- === SUBSYSTEM: Vector Registers === -->
  <rect class="subsystem" x="30" y="270" width="200" height="120" rx="2"/>
  <text class="sub-header" x="130" y="290">Vector Registers</text>

  <rect class="block" x="50" y="300" width="70" height="35"/>
  <text class="sub-label" x="85" y="322">V0</text>

  <rect class="block" x="130" y="300" width="70" height="35"/>
  <text class="sub-label" x="165" y="322">V1</text>

  <rect class="block" x="50" y="345" width="70" height="35"/>
  <text class="sub-label" x="85" y="367">V2</text>

  <rect class="block" x="130" y="345" width="70" height="35"/>
  <text class="sub-label" x="165" y="367">V3</text>

  <!-- === MUX A (OpA) === -->
  <polygon class="block" points="280,120 330,100 330,160"/>
  <text class="sub-label" x="305" y="135" font-size="10">OpA</text>
  <text class="signal" x="335" y="110" font-size="8">OpA_sel</text>

  <!-- === MUX B (OpB) === -->
  <polygon class="block" points="280,220 330,200 330,260"/>
  <text class="sub-label" x="305" y="235" font-size="10">OpB</text>
  <text class="signal" x="335" y="210" font-size="8">OpB_sel</text>

  <!-- === ALU (chevron shape) === -->
  <polygon class="block" points="380,110 450,140 450,220 380,250"/>
  <text class="block-label" x="415" y="185">ALU</text>
  <text class="signal" x="415" y="105" font-size="8">alu_op</text>

  <!-- === Branch Comparator (ellipse) === -->
  <ellipse class="block" cx="415" cy="310" rx="45" ry="25"/>
  <text class="sub-label" x="415" y="315" font-size="10">CMP</text>
  <text class="signal" x="470" y="310" font-size="8">Z, N</text>

  <!-- === IMM Generator === -->
  <rect class="block" x="280" y="370" width="120" height="40"/>
  <text class="sub-label" x="340" y="395">ImmGen</text>
  <text class="signal" x="280" y="405" font-size="8">imm_sel</text>

  <!-- === Memory (big rectangle) === -->
  <rect class="block" x="520" y="80" width="180" height="160"/>
  <text class="block-label" x="610" y="110">Memory</text>
  <text class="sub-label" x="610" y="130" font-size="10">64KB Unified</text>
  <text class="sub-label" x="610" y="150" font-size="9">(Code + Data + Stack)</text>

  <!-- Memory address register -->
  <rect class="block" x="520" y="260" width="180" height="35"/>
  <text class="sub-label" x="610" y="282">MAR</text>

  <!-- Memory data register -->
  <rect class="block" x="520" y="310" width="180" height="35"/>
  <text class="sub-label" x="610" y="332">MDR</text>

  <!-- === PC + Adder === -->
  <rect class="block" x="30" y="430" width="100" height="40"/>
  <text class="sub-label" x="80" y="455">PC</text>

  <!-- PC+4 adder (chevron) -->
  <polygon class="block" points="160,435 200,445 200,465 160,475"/>
  <text class="sub-label" x="180" y="458" font-size="9">+4</text>

  <!-- === MUX for PC === -->
  <polygon class="block" points="230,435 280,445 280,465 230,475"/>
  <text class="sub-label" x="255" y="458" font-size="9">PC</text>
  <text class="signal" x="285" y="458" font-size="8">pc_sel</text>

  <!-- === Control Unit (big subsystem) === -->
  <rect class="subsystem" x="520" y="380" width="420" height="200" rx="2"/>
  <text class="sub-header" x="730" y="400">Control Unit (Microcoded)</text>

  <!-- Microcode ROM -->
  <rect class="block" x="540" y="415" width="140" height="50"/>
  <text class="sub-label" x="610" y="445">Microcode ROM</text>

  <!-- Instruction Decoder -->
  <rect class="block" x="700" y="415" width="120" height="50"/>
  <text class="sub-label" x="760" y="445">Instr Decoder</text>

  <!-- Micro sequencer -->
  <rect class="block" x="540" y="485" width="140" height="50"/>
  <text class="sub-label" x="610" y="515">Micro Sequencer</text>

  <!-- Control Signal Generator -->
  <rect class="block" x="700" y="485" width="200" height="50"/>
  <text class="sub-label" x="800" y="515">Control Signal Gen</text>

  <!-- === I/O Ports === -->
  <rect class="block" x="760" y="100" width="120" height="40"/>
  <text class="sub-label" x="820" y="125">Port I/O</text>
  <text class="sub-label" x="820" y="140" font-size="8">0x01=IN, 0x02=OUT</text>

  <!-- === FLAGS register === -->
  <rect class="block" x="760" y="180" width="120" height="35"/>
  <text class="sub-label" x="820" y="202">FLAGS</text>

  <!-- ===== DATA PATHS (solid lines) ===== -->

  <!-- Register File → OpA MUX -->
  <line class="data-line" x1="210" y1="100" x2="280" y2="120"/>
  <text class="signal" x="230" y="108">rd_data</text>

  <!-- Register File → OpB MUX -->
  <line class="data-line" x1="210" y1="145" x2="280" y2="220"/>
  <text class="signal" x="230" y="195">rs_data</text>

  <!-- OpA MUX → ALU -->
  <line class="data-line" x1="330" y1="130" x2="380" y2="155"/>
  <text class="signal" x="350" y="135" font-size="8">alu_a</text>

  <!-- OpB MUX → ALU -->
  <line class="data-line" x1="330" y1="230" x2="380" y2="210"/>
  <text class="signal" x="350" y="220" font-size="8">alu_b</text>

  <!-- ALU → Memory (address) -->
  <line class="data-line" x1="450" y1="180" x2="520" y2="277"/>
  <text class="signal" x="475" y="220" font-size="8">alu_out</text>

  <!-- ALU → FLAGS -->
  <line class="data-line" x1="450" y1="300" x2="760" y2="197"/>
  <text class="signal" x="590" y="250" font-size="8">alu_flags</text>

  <!-- ALU → Comparator -->
  <line class="data-line" x1="415" y1="250" x2="415" y2="285"/>
  <text class="signal-vert" x="425" y="270" font-size="8">cmp_in</text>

  <!-- Memory → MDR -->
  <line class="data-line" x1="610" y1="240" x2="610" y2="310"/>
  <text class="signal" x="620" y="275" font-size="8">mem_out</text>

  <!-- MDR → Register File (writeback) -->
  <path class="data-line" d="M520,327 L30,327 L30,180 L50,180"/>
  <text class="signal" x="200" y="322" font-size="8">wb_data</text>

  <!-- MAR → Memory -->
  <line class="data-line" x1="610" y1="260" x2="610" y2="260"/>
  <line class="data-line" x1="610" y1="295" x2="610" y2="260"/>

  <!-- PC → PC+4 Adder -->
  <line class="data-line" x1="130" y1="450" x2="160" y2="450"/>

  <!-- PC+4 → PC MUX -->
  <line class="data-line" x1="200" y1="450" x2="230" y2="450"/>

  <!-- PC MUX → PC -->
  <path class="data-line" d="M255,475 L255,500 L50,500 L50,470"/>

  <!-- PC → Memory (instruction fetch) -->
  <line class="data-line" x1="80" y1="430" x2="80" y2="420" stroke="none"/>
  <path class="data-line" d="M80,430 L80,420 L520,420 L520,277"/>

  <!-- Register File → ImmGen (for IMM instructions) -->
  <line class="data-line" x1="130" y1="240" x2="130" y2="380"/>
  <line class="data-line" x1="130" y1="380" x2="280" y2="390"/>

  <!-- ImmGen → OpB MUX -->
  <line class="data-line" x1="340" y1="370" x2="340" y2="260"/>

  <!-- I/O Port → Register File -->
  <line class="data-line" x1="760" y1="130" x2="700" y2="130"/>
  <path class="data-line" d="M700,130 L700,60 L250,60 L250,100"/>
  <text class="signal" x="500" y="55" font-size="8">port_data</text>

  <!-- Register File → I/O Port -->
  <path class="data-line" d="M210,90 L700,90 L700,100"/>
  <text class="signal" x="500" y="85" font-size="8">port_wr_data</text>

  <!-- ===== CONTROL PATHS (dashed lines) ===== -->

  <!-- Control Unit → Register File (reg_wr) -->
  <path class="ctrl-line" d="M540,440 L40,440 L40,150 L50,150"/>
  <text class="signal" x="45" y="435" font-size="8">reg_wr</text>

  <!-- Control Unit → Memory (read/write) -->
  <path class="ctrl-line" d="M680,440 L680,250"/>
  <text class="signal" x="690" y="255" font-size="8">mem_wr</text>

  <!-- Control Unit → PC (pc_wr) -->
  <path class="ctrl-line" d="M540,500 L40,500 L40,455 L30,455"/>
  <text class="signal" x="45" y="495" font-size="8">pc_wr</text>

  <!-- Control Unit → OpA MUX -->
  <path class="ctrl-line" d="M540,430 L310,430 L310,165"/>
  <text class="signal" x="530" y="425" font-size="8">OpA_sel</text>

  <!-- Control Unit → OpB MUX -->
  <path class="ctrl-line" d="M540,435 L310,435 L310,265"/>
  <text class="signal" x="530" y="432" font-size="8">OpB_sel</text>

  <!-- Control Unit → ALU -->
  <path class="ctrl-line" d="M540,425 L430,425 L430,255"/>
  <text class="signal" x="520" y="420" font-size="8">alu_op</text>

  <!-- Control Unit → Memory (addr_sel) -->
  <path class="ctrl-line" d="M540,420 L510,420 L510,300 L520,300"/>
  <text class="signal" x="505" y="295" font-size="8">addr_sel</text>

  <!-- Control Unit → PC MUX -->
  <path class="ctrl-line" d="M700,535 L700,560 L300,560 L300,478"/>
  <text class="signal" x="500" y="555" font-size="8">pc_sel</text>

  <!-- Comparator → Control Unit (branch) -->
  <path class="ctrl-line" d="M415,335 L415,365 L520,365 L520,490"/>
  <text class="signal" x="460" y="365" font-size="8">branch_taken</text>

  <!-- External inputs -->
  <text class="signal" x="5" y="455" font-size="9" font-weight="bold">reset</text>
  <line class="data-line" x1="15" y1="455" x2="30" y2="455" marker-end="url(#arrow)"/>

  <!-- External outputs -->
  <text class="signal" x="890" y="125" font-size="9" font-weight="bold">stdout</text>
  <line class="data-line" x1="880" y1="120" x2="890" y2="120" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="black"/>
    </marker>
  </defs>
</svg>
